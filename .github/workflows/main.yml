name: Ejecutar Sistema de Admision

on:
  schedule:
    - cron: '0 8 * * *' # Esto lo ejecutará todos los días a las 8:00 AM (Hora UTC)
  workflow_dispatch: # Esto te permite darle a un botón y ejecutarlo manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo del repo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14.3'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests python-dotenv

      - name: Ejecutar script de Edison Clase
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EXCEL_LINK: ${{ secrets.EXCEL_LINK }}
          WHATSAPP_LINK: ${{ secrets.WHATSAPP_LINK }}
        run: python main.py